<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT Comm Lab — Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #FDFBF7;
            color: #1F1F1F;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #2B5C5C; margin-bottom: 10px; }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #E8E2D8;
        }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #E8E2D8; border-radius: 6px; }
        .login-box button { width: 100%; padding: 12px; background: #2B5C5C; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #E8E2D8; text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 700; color: #2B5C5C; }
        .stat-label { font-size: 0.8rem; color: #7A7A7A; }
        .chart-container { background: white; border-radius: 8px; border: 1px solid #E8E2D8; padding: 20px; margin-bottom: 30px; }
        .question-list { background: white; border-radius: 8px; border: 1px solid #E8E2D8; overflow: hidden; }
        .question-item { padding: 12px 20px; border-bottom: 1px solid #E8E2D8; display: flex; justify-content: space-between; align-items: center; }
        .question-item:last-child { border-bottom: none; }
        .question-text { flex: 1; font-size: 0.9rem; }
        .question-source { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; background: #F8F5F0; }
        .source-gemini { background: #E8F5E9; color: #2E7D32; }
        .source-kb { background: #E3F2FD; color: #1565C0; }
        .source-curated { background: #FFF3E0; color: #E65100; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #2B5C5C; }
        .refresh-btn { margin-bottom: 20px; padding: 10px 20px; background: #2B5C5C; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection" class="login-box">
        <h2>🔐 Analytics Access</h2>
        <input type="password" id="adminPassword" placeholder="Enter admin password">
        <button onclick="login()">View Analytics</button>
    </div>
    
    <div id="analyticsSection" style="display: none;">
        <h1>📊 PT Comm Lab — Analytics Dashboard</h1>
        <p>Last 7 days | Last updated: <span id="lastUpdated"></span></p>
        <button class="refresh-btn" onclick="loadAnalytics()">🔄 Refresh Data</button>
        
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="chart-container">
            <h2>🔥 Most Asked Questions This Week</h2>
            <div id="topQuestions" class="question-list"></div>
        </div>
        
        <div class="chart-container">
            <h2>❓ Knowledge Base Gaps (Needs Answers)</h2>
            <div id="gapsList" class="question-list"></div>
        </div>
        
        <div class="chart-container">
            <h2>📈 Provider Usage Breakdown</h2>
            <div id="providerBreakdown" class="question-list"></div>
        </div>
    </div>
</div>

<script>
const API_BASE = 'https://api.ptcommlab.com';
let authToken = null;

async function login() {
    const password = document.getElementById('adminPassword').value;
    const response = await fetch(`${API_BASE}/admin/kb`, {
        headers: { 'Authorization': 'Basic ' + btoa(`admin:${password}`) }
    });
    if (response.ok) {
        authToken = password;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('analyticsSection').style.display = 'block';
        loadAnalytics();
    } else {
        alert('Wrong password');
    }
}

async function loadAnalytics() {
    try {
        const response = await fetch(`${API_BASE}/admin/analytics?days=7`, {
            headers: { 'Authorization': 'Basic ' + btoa(`admin:${authToken}`) }
        });
        const data = await response.json();
        
        document.getElementById('lastUpdated').innerText = new Date().toLocaleString();
        
        // Stats grid
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card"><div class="stat-number">${data.total_requests || 0}</div><div class="stat-label">Total AI Requests</div></div>
            <div class="stat-card"><div class="stat-number">${data.cache_hit_rate || 0}%</div><div class="stat-label">Cache Hit Rate</div></div>
            <div class="stat-card"><div class="stat-number">${data.provider_breakdown?.knowledge_base || 0}</div><div class="stat-label">KB Answers (cached)</div></div>
            <div class="stat-card"><div class="stat-number">${data.provider_breakdown?.gemini || 0}</div><div class="stat-label">Gemini API Calls</div></div>
        `;
        
        // Top questions
        const topList = document.getElementById('topQuestions');
        if (data.top_questions && data.top_questions.length > 0) {
            topList.innerHTML = data.top_questions.slice(0, 20).map(q => `
                <div class="question-item">
                    <div class="question-text"><strong>${escapeHtml(q.question)}</strong></div>
                    <div class="question-source source-${q.answer_source === 'knowledge_base' ? 'kb' : (q.answer_source === 'curated' ? 'curated' : 'gemini')}">${q.answer_source}</div>
                </div>
            `).join('');
        } else {
            topList.innerHTML = '<div class="question-item">No data yet. Ask questions in the AI tab to generate analytics.</div>';
        }
        
        // Gaps (unanswered)
        const gapsList = document.getElementById('gapsList');
        if (data.unanswered_questions && data.unanswered_questions.length > 0) {
            gapsList.innerHTML = data.unanswered_questions.slice(0, 20).map(q => `
                <div class="question-item">
                    <div class="question-text">${escapeHtml(q.question)}</div>
                    <button class="question-source" onclick="copyToClipboard('${escapeHtml(q.question)}')" style="cursor:pointer;">📋 Copy to add to KB</button>
                </div>
            `).join('');
        } else {
            gapsList.innerHTML = '<div class="question-item">🎉 No unanswered questions! Your knowledge base is covering everything.</div>';
        }
        
        // Provider breakdown
        const providerDiv = document.getElementById('providerBreakdown');
        const pb = data.provider_breakdown || {};
        providerDiv.innerHTML = `
            <div class="question-item"><span>🤖 Gemini (primary)</span><strong>${pb.gemini || 0}</strong></div>
            <div class="question-item"><span>🔄 DeepSeek (fallback)</span><strong>${pb.deepseek || 0}</strong></div>
            <div class="question-item"><span>📚 Knowledge Base (cached)</span><strong>${pb.knowledge_base || 0}</strong></div>
            <div class="question-item"><span>⭐ Curated Cache (hardcoded)</span><strong>${pb.curated || 0}</strong></div>
            <div class="question-item"><span>⚠️ Fallback Responses</span><strong>${pb.fallback || 0}</strong></div>
        `;
        
    } catch (e) {
        console.error(e);
        alert('Error loading analytics: ' + e.message);
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    alert('Copied to clipboard. Go to Admin → Add New to create an answer.');
}
</script>
</body>
</html>
