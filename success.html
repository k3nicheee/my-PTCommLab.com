<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #FDFBF7; color: #2B5C5C; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.container { max-width: 500px; background: white; border-radius: 16px; padding: 40px 32px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
.icon { font-size: 48px; margin-bottom: 20px; }
h1 { font-size: 28px; font-weight: 600; margin-bottom: 16px; color: #2B5C5C; }
p { color: #6A6A6A; margin-bottom: 24px; }
.btn { display: inline-block; background: #2B5C5C; color: white; padding: 12px 28px; border-radius: 30px; text-decoration: none; }
.btn:hover { background: #4A7A7A; }
</style>

<body>
<div class="container">
  <div class="icon">📬</div>
  <h1>Check your email</h1>
  <p>Your free chapter and App access link are on their way.</p>
  <a href="https://app.ptcommlab.com" class="btn" id="openAppBtn">Open App →</a>
</div>

<script>
  // Store a flag in sessionStorage that user just signed up
  sessionStorage.setItem('ptcomm_just_signed_up', 'true');
  
  // Try to get email from URL if present (Sender.net may pass it)
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (email) {
    sessionStorage.setItem('ptcomm_signup_email', email);
  }
  
  // When user clicks the button, the flag is already set
  document.getElementById('openAppBtn').addEventListener('click', function() {
    // Flag is in sessionStorage, app will read it
  });
</script>
</body>
